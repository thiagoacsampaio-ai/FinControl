<style>
:root {
  --ink:       #0d1117;
  --ink2:      #3a4252;
  --ink3:      #7c8799;
  --line:      #e8ecf2;
  --line2:     #f2f5f9;
  --canvas:    #f6f8fc;
  --surface:   #ffffff;
  --green:     #00875a;
  --green-bg:  #e6f4ef;
  --red:       #c9283e;
  --red-bg:    #fdecea;
  --blue:      #1a56db;
  --blue-bg:   #ebf0fe;
  --amber:     #b45309;
  --amber-bg:  #fef3c7;
  --purple:    #6d28d9;
  --purple-bg: #ede9fe;
  --teal:      #0d7377;
  --teal-bg:   #d0f0f1;
  --r:         8px;
  --r-lg:      14px;
  --sh:        0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
  --sh-md:     0 4px 24px rgba(0,0,0,.10);
  --sidebar-w: 228px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--canvas);color:var(--ink);font-size:14px;line-height:1.5}

/* ── LAYOUT ── */
#shell{display:flex;height:100vh}
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--ink);display:flex;flex-direction:column;overflow-y:auto}
#workspace{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:54px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:24px}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:var(--surface);border-radius:var(--r-lg);padding:40px;width:360px;box-shadow:var(--sh-md)}
.login-box h2{font-size:20px;font-weight:700;margin-bottom:4px}
.login-box p{font-size:13px;color:var(--ink3);margin-bottom:24px}
.login-box .fg{margin-bottom:14px}
.login-box label{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:5px}
.login-box input{width:100%;border:1.5px solid var(--line);border-radius:var(--r);padding:9px 12px;font-size:13px;font-family:inherit}
.login-box input:focus{outline:none;border-color:var(--blue)}
.login-err{color:var(--red);font-size:12px;margin-bottom:10px;display:none}

/* ── SIDEBAR ── */
.sb-brand{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-brand h1{color:#fff;font-size:16px;font-weight:700;letter-spacing:-.4px}
.sb-brand span{color:rgba(255,255,255,.35);font-size:11px;font-family:'DM Mono',monospace}
.sb-group{padding:16px 0 4px}
.sb-lbl{color:rgba(255,255,255,.25);font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:0 16px 6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 16px;color:rgba(255,255,255,.6);cursor:pointer;font-size:13px;border-left:2px solid transparent;transition:all .12s}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-item.on{background:rgba(255,255,255,.1);color:#fff;border-left-color:#00d4aa;font-weight:600}
.sb-item svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.sb-item.on svg{opacity:1}
.sb-footer{margin-top:auto;padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:6px;flex-wrap:wrap}

/* ── TOPBAR ── */
.tb-title{font-size:15px;font-weight:700;color:var(--ink)}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-date{font-size:12px;color:var(--ink3);background:var(--line2);border:1px solid var(--line);padding:3px 10px;border-radius:20px;font-family:'DM Mono',monospace}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .12s;font-family:inherit}
.btn-dark{background:var(--ink);color:#fff}.btn-dark:hover{background:var(--ink2)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{filter:brightness(1.08)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{filter:brightness(1.1)}
.btn-ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink2)}.btn-ghost:hover{border-color:var(--ink2);color:var(--ink)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.ico-btn{background:transparent;border:1px solid var(--line);border-radius:var(--r);padding:5px 7px;cursor:pointer;color:var(--ink3);transition:all .12s;display:inline-flex}
.ico-btn:hover{background:var(--line2);color:var(--ink)}

/* ── CARDS ── */
.card{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--line);box-shadow:var(--sh)}
.card-head{padding:14px 18px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.card-head h3{font-size:13px;font-weight:700;color:var(--ink)}
.card-body{padding:16px 18px}

/* ── KPI STRIP ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:14px 16px;box-shadow:var(--sh)}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.kpi-val{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-.5px}
.kpi-sub{font-size:11px;color:var(--ink3);margin-top:3px}
.kpi.c-g .kpi-val{color:var(--green)}
.kpi.c-r .kpi-val{color:var(--red)}
.kpi.c-b .kpi-val{color:var(--blue)}
.kpi.c-p .kpi-val{color:var(--purple)}
.kpi.c-t .kpi-val{color:var(--teal)}
.kpi.c-a .kpi-val{color:var(--amber)}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--line2);color:var(--ink3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:8px 12px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--line)}
td{padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f9fafb}
.v-pos{color:var(--green);font-weight:600;font-family:'DM Mono',monospace}
.v-neg{color:var(--red);font-weight:600;font-family:'DM Mono',monospace}
.v-neu{color:var(--blue);font-weight:600;font-family:'DM Mono',monospace}
.mono{font-family:'DM Mono',monospace;font-size:12px}

/* ── BADGES ── */
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.tag-g{background:var(--green-bg);color:var(--green)}
.tag-r{background:var(--red-bg);color:var(--red)}
.tag-b{background:var(--blue-bg);color:var(--blue)}
.tag-p{background:var(--purple-bg);color:var(--purple)}
.tag-a{background:var(--amber-bg);color:var(--amber)}
.tag-t{background:var(--teal-bg);color:var(--teal)}
.tag-x{background:var(--line2);color:var(--ink3)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:900;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--sh-md);width:580px;max-width:96vw;max-height:92vh;overflow-y:auto}
.modal-lg{width:760px}
.modal-xl{width:960px}
.modal-head{padding:18px 22px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-head h3{font-size:15px;font-weight:700}
.modal-body{padding:22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--surface)}

/* ── FORM ── */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
.fg.third{grid-column:span 1}
label{font-size:12px;font-weight:600;color:var(--ink2)}
input,select,textarea{border:1.5px solid var(--line);border-radius:var(--r);padding:8px 11px;font-size:13px;color:var(--ink);background:var(--surface);width:100%;outline:none;transition:border-color .12s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
.field-hint{font-size:11px;color:var(--ink3);margin-top:2px}
.section-sep{grid-column:1/-1;border:none;border-top:1px dashed var(--line);margin:4px 0}
.fg-lbl{grid-column:1/-1;font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;padding-top:4px}

/* ── PROGRESS ── */
.pbar{background:var(--line);border-radius:4px;height:5px;overflow:hidden}
.pfill{height:100%;border-radius:4px;transition:width .3s}

/* ── MISC ── */
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.hidden{display:none!important}
.empty{text-align:center;padding:48px 20px;color:var(--ink3)}
.empty big{display:block;font-size:32px;margin-bottom:8px}
.tip{padding:10px 13px;border-radius:var(--r);font-size:12px;line-height:1.5}
.tip-blue{background:var(--blue-bg);color:var(--blue);border-left:3px solid var(--blue)}
.tip-green{background:var(--green-bg);color:var(--green);border-left:3px solid var(--green)}
.tip-amber{background:var(--amber-bg);color:var(--amber);border-left:3px solid var(--amber)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.gap-y>*+*{margin-top:16px}
.txt-sm{font-size:12px}
.txt-xs{font-size:11px;color:var(--ink3)}
.fw7{font-weight:700}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}

/* ── MOBILE ── */
@media(max-width:700px){
  :root{--sidebar-w:0px}
  #shell{flex-direction:column}
  #sidebar{display:none;position:fixed;inset:0;z-index:800;width:100%;height:100%;overflow-y:auto}
  #sidebar.mob-open{display:flex}
  #topbar{padding:0 12px;height:50px}
  #content{padding:12px}
  .kpi-row{grid-template-columns:repeat(2,1fr)!important}
  .two,.three{grid-template-columns:1fr!important}
  .fgrid{grid-template-columns:1fr!important}
  .fg.full{grid-column:1!important}
  .tb-date{display:none}
  table{font-size:12px}
  td,th{padding:7px 8px}
  .login-box{width:92vw;padding:28px 20px}
  .modal{max-width:98vw;max-height:98vh}
  #mob-menu-btn{display:flex!important}
}
#mob-menu-btn{display:none;background:transparent;border:1px solid rgba(255,255,255,.2);border-radius:6px;color:rgba(255,255,255,.7);padding:6px 10px;cursor:pointer;font-size:16px;margin-right:6px}

/* ── ICON PICKER ── */
.icon-picker-wrap{display:flex;gap:5px;flex-wrap:wrap;max-height:120px;overflow-y:auto;border:1.5px solid var(--line);border-radius:var(--r);padding:8px}
.icon-btn-sel{background:var(--blue-bg)!important;border-color:var(--blue)!important;color:var(--blue)!important}

/* ── USER MANAGE ── */
.user-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--line)}
.user-row:last-child{border-bottom:none}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px">
      <img src="favicon.svg" alt="FinControl" width="40" height="40" style="border-radius:9px">
      <h2 style="margin:0">FinControl</h2>
    </div>
    <p style="margin-bottom:28px">Controle financeiro compartilhado</p>
    <div class="login-err" id="login-err" style="display:none;margin-bottom:14px"></div>
    <button id="btn-google-login" onclick="doLoginGoogle()" style="width:100%;display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 16px;border:1.5px solid #dadce0;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#3c4043;font-family:inherit;transition:box-shadow .2s" onmouseover="this.style.boxShadow='0 2px 8px rgba(0,0,0,.15)'" onmouseout="this.style.boxShadow='none'">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Entrar com Google
    </button>
    <p style="font-size:11px;color:var(--ink3);margin-top:20px;text-align:center">☁️ Sincronizado em tempo real · Use em qualquer dispositivo</p>
  </div>
</div>

<div id="shell" class="hidden">

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sb-brand">
    <img src="favicon.svg" alt="FinControl" width="32" height="32" style="border-radius:7px;display:block">
    <h1>FinControl</h1>
    <span>v3.2 ☁</span>
  </div>

  <div class="sb-group">
    <div class="sb-lbl">Geral</div>
    <div class="sb-item on" onclick="go('painel')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Painel
    </div>
  </div>

  <div class="sb-group">
    <div class="sb-lbl">Movimentações</div>
    <div class="sb-item" onclick="go('lancamentos')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Lançamentos
    </div>
    <div class="sb-item" onclick="go('importar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Importar
    </div>
    <div class="sb-item" onclick="go('parcelados')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      Parcelados
    </div>
    <div class="sb-item" onclick="go('fixos')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Despesas Fixas
    </div>
  </div>

  <div class="sb-group">
    <div class="sb-lbl">Contas & Cartões</div>
    <div class="sb-item" onclick="go('contas')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      Contas
    </div>
    <div class="sb-item" onclick="go('cartoes')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      Cartões
    </div>
    <div class="sb-item" onclick="go('faturas')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Faturas
    </div>
  </div>

  <div class="sb-group">
    <div class="sb-lbl">Configurações</div>
    <div class="sb-item" onclick="go('categorias')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      Categorias
    </div>
    <div class="sb-item" onclick="go('relatorio')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Relatório
    </div>
    <div class="sb-item" onclick="go('usuarios')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Usuários
    </div>
  </div>

  <div class="sb-footer">
    <button class="btn btn-ghost btn-sm" style="flex:1;font-size:11px;color:rgba(255,255,255,.4);border-color:rgba(255,255,255,.12);background:transparent" onclick="exportDB()">↓ Backup</button>
    <button class="btn btn-ghost btn-sm" style="flex:1;font-size:11px;color:rgba(255,255,255,.4);border-color:rgba(255,255,255,.12);background:transparent" onclick="triggerRestore()">↑ Restore</button>
    <button class="btn btn-ghost btn-sm" style="flex:1;font-size:11px;color:rgba(255,255,255,.4);border-color:rgba(255,255,255,.12);background:transparent" onclick="doLogout()">Sair</button>
  </div>
</div>

<!-- WORKSPACE -->

function save(){

  _saveTimeout=setTimeout(async()=>{
    try{
      const {fs,doc,setDoc}=_fire;
      await setDoc(doc(fs,DB_DOC),{data:JSON.stringify(db),updatedAt:Date.now()});

let db = loadDB();

// ── HELPERS ──────────────────────────────────────────────────────────
const R = v => _hideVals ? 'R$\u00a0\u2022\u2022\u2022\u2022' : 'R$\u00a0' + Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
function toggleHideVals(){_hideVals=!_hideVals;const b=document.getElementById('btn-hide-vals');if(b){b.innerHTML=_hideVals?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>':'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';}go(page);}
const fdt = d => d ? new Date(d+'T12:00').toLocaleDateString('pt-BR') : '';
const nid = a => a.length ? Math.max(...a.map(x=>Number(x.id)||0))+1 : 1;
const esc = v => String(v??'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const ym = d => (d||'').slice(0,7);
function addMonths(dateStr, n){const [y,m,d]=dateStr.split('-').map(Number);const dt=new Date(y,m-1+n,d||1,12);return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`}
function addDays(dateStr,n){const dt=new Date(dateStr+'T12:00');dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10)}
function monthEnd(yymm){const [y,m]=yymm.split('-').map(Number);return new Date(y,m,0).getDate()}
function cmpName(a,b){return String(a.nome||'').localeCompare(String(b.nome||''),'pt-BR',{sensitivity:'base'})}
function sortedContas(){return [...db.contas].sort(cmpName)}
function sortedCartoes(){return [...db.cartoes].sort(cmpName)}
function sortedCats(tipo){return db.categorias.filter(c=>!tipo||c.tipo===tipo).sort((a,b)=>catFullName(a).localeCompare(catFullName(b),'pt-BR',{sensitivity:'base'}))}
function catById(id){return db.categorias.find(c=>c.id==id)||{nome:'—',icone:'',tipo:'D',parent_id:null}}
function catFullName(c){const p=c&&c.parent_id?db.categorias.find(x=>x.id==c.parent_id):null;return p?`${p.nome} / ${c.nome}`:(c?c.nome:'—')}
function catLabel(c){return `${c.icone||''} ${catFullName(c)}`.trim()}
function contaNomes(){return [...db.contas.filter(c=>c.ativo).sort(cmpName).map(c=>c.nome),...db.cartoes.filter(c=>c.ativo).sort(cmpName).map(c=>c.nome)]}
function isContaBancaria(nome){return !!db.contas.find(c=>c.nome===nome)}
function isEntrada(t){return t==='R'||t==='Res'}
function isSaida(t){return t==='D'||t==='I'}
function signedValue(l){if(l.tipo==='Tr'){return l.transfer_out?-Number(l.valor||0):Number(l.valor||0)}return isEntrada(l.tipo)?Number(l.valor||0):isSaida(l.tipo)?-Number(l.valor||0):0}
function lancEfetivo(l, considerarPendentes=false){return considerarPendentes || l.pago!==false || l.tipo==='Tr'}
function saldoConta(nome, ate=null, considerarPendentes=false){const c=db.contas.find(x=>x.nome===nome); const base=c?Number(c.saldo_ini||0):0;if(!c)return 0;return base+db.lancamentos.filter(l=>l.conta===nome && (!ate||l.data<=ate) && lancEfetivo(l,considerarPendentes)).reduce((s,l)=>s+signedValue(l),0)}
function saldoContaDia(nome,data){return saldoConta(nome,data,false)}
function gastoCartao(nome){return db.lancamentos.filter(l=>l.conta===nome&&l.tipo==='D').reduce((s,l)=>s+Number(l.valor||0),0)}
function tipoTag(t){if(t==='R') return '<span class="tag tag-g">Receita</span>'; if(t==='D') return '<span class="tag tag-r">Despesa</span>'; if(t==='I') return '<span class="tag tag-b">Investimento</span>'; if(t==='Res') return '<span class="tag tag-t">Resgate</span>'; if(t==='Tr') return '<span class="tag tag-x">Transferência</span>'; return '<span class="tag tag-x">'+esc(t)+'</span>'}
function vClass(t,transfer_out){if(t==='Tr')return transfer_out?'v-neg':'v-pos';return isEntrada(t)?'v-pos':t==='I'?'v-neu':'v-neg'}
function vSign(t,transfer_out){if(t==='Tr')return transfer_out?'-':'+';return isEntrada(t)?'+':t==='I'?'▸':'-'}
function origemTag(l){if(l.origem==='fixo')return '<span class="tag tag-a txt-xs">fixo</span>'; if(l.origem==='parcelado')return '<span class="tag tag-p txt-xs">parcelado</span>'; if(l.origem==='provisao_fatura')return '<span class="tag tag-t txt-xs">💳 fatura</span>'; return l.importado?'<span class="tag tag-b txt-xs">importado</span>':'<span class="tag tag-x txt-xs">manual</span>'}

// ── helper: detecta fatura do cartão para uma data de lançamento ──
function faturaCartao(nomeCartao, dataLanc){
  const c=db.cartoes.find(x=>x.nome===nomeCartao);
  if(!c)return null;
  const d=new Date(dataLanc+'T12:00');
  const dia=d.getDate();
  // Mês de fechamento da fatura (1-based)
  let fY=d.getFullYear(), fM=d.getMonth()+1;
  if(dia>c.fechamento){ fM++; if(fM>12){fM=1;fY++;} }
  // Fechamento: dia c.fechamento do mês fM
  const diaFech=String(Math.min(c.fechamento,new Date(fY,fM,0).getDate())).padStart(2,'0');
  const fechamento=`${fY}-${String(fM).padStart(2,'0')}-${diaFech}`;
  // Vencimento: se vencimento < fechamento (ex: fecha 26, paga 10) → mês seguinte ao fechamento
  let vY=fY, vM=fM;
  if(c.vencimento<c.fechamento){ vM++; if(vM>12){vM=1;vY++;} }
  const diaVenc=String(Math.min(c.vencimento,new Date(vY,vM,0).getDate())).padStart(2,'0');
  const vencimento=`${vY}-${String(vM).padStart(2,'0')}-${diaVenc}`;
  return{cartao:c,vencimento,fechamento,cor:c.cor};
}
function faturaTag(l){
  if(!db.cartoes.find(x=>x.nome===l.conta))return '';
  const f=faturaCartao(l.conta,l.data);
  if(!f)return '';
  const hoje=new Date().toISOString().slice(0,10);
  const diasVenc=Math.ceil((new Date(f.vencimento)-new Date(hoje))/(1000*60*60*24));
  const urgente=diasVenc>=0&&diasVenc<=5;
  const vencido=diasVenc<0&&l.pago===false;
  return`<div style="margin-top:3px;display:flex;gap:4px;align-items:center">
    <span class="tag ${vencido?'tag-r':urgente?'tag-a':'tag-x'}" style="font-size:10px">💳 Fatura ${fdt(f.vencimento)}${urgente?' ⚡':vencido?' ⚠️':''}</span>
    <span style="font-size:10px;color:var(--ink3)">fecha ${fdt(f.fechamento)}</span>
  </div>`;
}

function migrateDB(){db.faturas_pagas=db.faturas_pagas||[];db.cartoes=db.cartoes||[];db.categorias=db.categorias||[];db.lancamentos=db.lancamentos||[];db.parcelados=db.parcelados||[];db.fixos=db.fixos||[];
  db.categorias.forEach(c=>{if(c.parent_id===undefined)c.parent_id=null;if(!c.icone)c.icone='📌';if(!c.cor)c.cor=c.tipo==='R'?'#00875a':'#c9283e'});
  db.lancamentos.forEach(l=>{if(l.pago===undefined)l.pago=true;if(!l.origem)l.origem=l.importado?'importado':'manual';l.valor=Number(l.valor||0)});
  db.parcelados.forEach(p=>{if(!p.primeira_data)p.primeira_data=p.data;if(p.pg===undefined)p.pg=0});
  db.fixos.forEach(f=>{if(!f.meses)f.meses={};f.valor=Number(f.valor||0);if(f.repetir_meses===undefined)f.repetir_meses=0;if(!f.data_inicio)f.data_inicio=new Date().toISOString().slice(0,10);if(!f.frequencia)f.frequencia='mensal';});
  db.parcelados.forEach(p=>{if(!db.lancamentos.some(l=>l.origem==='parcelado'&&l.ref_id===p.id))regenerateParcelLaunches(p)});
  // Migra pagamento_fatura → provisao_fatura
  db.lancamentos.forEach(l=>{if(l.origem==='pagamento_fatura')l.origem='provisao_fatura';});
  save();
}

// ── FIXED LAUNCHES ──────────────────────────────────────────────────
const FREQ_LABEL={'diario':'Diário','semanal':'Semanal','quinzenal':'Quinzenal','mensal':'Mensal','bimestral':'Bimestral','trimestral':'Trimestral','semestral':'Semestral','anual':'Anual'};
function getFreqInterval(freq){return{mensal:1,bimestral:2,trimestral:3,semestral:6,anual:12}[freq]||1;}
function getSubMonthlyDates(f,mk){
  const freq=f.frequencia||'mensal';
  const firstDay=mk+'-01';
  const lastDay=mk+'-'+String(monthEnd(mk)).padStart(2,'0');
  const fD=new Date(firstDay+'T12:00'),lD=new Date(lastDay+'T12:00');
  const dates=[];
  if(freq==='diario'){
    let d=new Date(fD);while(d<=lD){dates.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);}
  } else {
    const interval=freq==='semanal'?7:15;
    const anchor=new Date((f.data_inicio||firstDay)+'T12:00');
    const diffMs=fD-anchor,diffDays=Math.floor(diffMs/86400000);
    const rem=((diffDays%interval)+interval)%interval;
    let d=new Date(fD.getTime()+(rem===0?0:(interval-rem))*86400000);
    while(d<=lD){if(d>=fD)dates.push(d.toISOString().slice(0,10));d=new Date(d.getTime()+interval*86400000);}
  }
  return dates;
}
function ensureFixedLaunchesForMonth(mk){
  let changed=false;
  db.fixos.filter(f=>f.ativo).forEach(f=>{
    const freq=f.frequencia||'mensal';
    const status=f.meses&&f.meses[mk]; if(status==='cancelado')return;
    const isSubMonthly=['diario','semanal','quinzenal'].includes(freq);
    if(isSubMonthly){
      // repetir_meses = duração máxima em meses a partir de data_inicio
      if(f.repetir_meses>0){
        const endMk=addMonths(f.data_inicio||mk+'-01',f.repetir_meses).slice(0,7);
        if(mk>endMk)return;
      }
      const startMk=(f.data_inicio||mk+'-01').slice(0,7);
      if(mk<startMk)return;
      getSubMonthlyDates(f,mk).forEach(data=>{
        let l=db.lancamentos.find(x=>x.origem==='fixo'&&x.ref_id===f.id&&x.data===data);
        if(!l){
          db.lancamentos.push({id:nid(db.lancamentos),data,desc:f.desc,tipo:'D',cat_id:f.cat_id,conta:f.conta,valor:f.valor,obs:'despesa fixa',importado:false,pago:false,origem:'fixo',ref_id:f.id});
          changed=true;
        } else {
          // Mesmo comportamento do mensal: respeita edições manuais de valor/data
          let ch2=false;
          if(!l._editado_manual){if(l.desc!==f.desc){l.desc=f.desc;ch2=true;}if(l.cat_id!==f.cat_id){l.cat_id=f.cat_id;ch2=true;}if(l.conta!==f.conta){l.conta=f.conta;ch2=true;}}
          if(ch2)changed=true;
        }
      });
    } else {
      const interval=getFreqInterval(freq);
      const dataIni=(f.data_inicio||mk+'-01').slice(0,7);
      const [sy,sm]=dataIni.split('-').map(Number);
      const [cy,cm]=mk.split('-').map(Number);
      const diff=(cy-sy)*12+(cm-sm);
      if(diff<0)return;
      if(f.repetir_meses>0&&diff>=f.repetir_meses)return;
      if(interval>1&&diff%interval!==0)return;
      const day=String(Math.min(Number(f.dia||1),monthEnd(mk))).padStart(2,'0');
      const data=`${mk}-${day}`;
      let l=db.lancamentos.find(x=>x.origem==='fixo'&&x.ref_id===f.id&&ym(x.data)===mk);
      if(!l){
        db.lancamentos.push({id:nid(db.lancamentos),data,desc:f.desc,tipo:'D',cat_id:f.cat_id,conta:f.conta,valor:f.valor,obs:'despesa fixa',importado:false,pago:status==='pago',origem:'fixo',ref_id:f.id});
        changed=true;
      } else {
        // Só atualiza desc/conta/cat se não foi editado manualmente; nunca sobrescreve valor e data manuais
        let ch2=false;
        if(!l._editado_manual){if(l.desc!==f.desc){l.desc=f.desc;ch2=true;}if(l.cat_id!==f.cat_id){l.cat_id=f.cat_id;ch2=true;}if(l.conta!==f.conta){l.conta=f.conta;ch2=true;}}
        if(ch2)changed=true;
      }
    }
  });
  if(changed)save();
}
function ensureFixedLaunchesBetween(ini,fim){let d=new Date((ini||new Date().toISOString().slice(0,10))+'T12:00');const end=new Date((fim||ini||new Date().toISOString().slice(0,10))+'T12:00');d.setDate(1);while(d<=end){ensureFixedLaunchesForMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);d.setMonth(d.getMonth()+1)}}

function ensureProvisaoFatura(cartaoId, mes){
  const c=db.cartoes.find(x=>x.id===cartaoId);
  if(!c)return;
  const transacoes=getFaturaTransacoes(cartaoId,mes);
  const total=transacoes.reduce((s,l)=>s+Number(l.valor||0),0);
  const datas=getFaturaVencimento(cartaoId,mes);
  const fp=db.faturas_pagas.find(x=>x.cartao_id===cartaoId&&x.mes===mes);
  // Conta destino: se pago usa a conta do pagamento, senão usa conta vinculada
  const contaVinc=c.conta_id?db.contas.find(x=>x.id===c.conta_id):null;
  const contaNome=fp?fp.conta_pagamento:(contaVinc?contaVinc.nome:null);
  let prov=db.lancamentos.find(l=>l.origem==='provisao_fatura'&&l.cartao_id===cartaoId&&l.fatura_mes===mes);
  if(total<=0&&!fp){
    if(prov){db.lancamentos=db.lancamentos.filter(l=>l.id!==prov.id);save();}
    return;
  }
  if(!contaNome)return;
  const catPag=db.categorias.find(x=>x.nome==='Outros (Despesa)')||db.categorias.find(x=>x.tipo==='D');
  const dataFinal=fp?fp.data_pagamento:(datas?datas.vencimento:new Date().toISOString().slice(0,10));
  const valorFinal=fp?fp.valor:total;
  if(!prov){
    db.lancamentos.push({id:nid(db.lancamentos),data:dataFinal,desc:`Fatura ${c.nome} ${mes}`,tipo:'D',cat_id:catPag?.id||null,conta:contaNome,valor:valorFinal,obs:`Pagamento fatura ${c.nome}`,importado:false,pago:!!fp,origem:'provisao_fatura',cartao_id:cartaoId,fatura_mes:mes});
    save();
  } else {
    let ch=false;
    if(prov.valor!==valorFinal){prov.valor=valorFinal;ch=true;}
    if(prov.pago!==!!fp){prov.pago=!!fp;ch=true;}
    if(prov.data!==dataFinal){prov.data=dataFinal;ch=true;}
    if(prov.conta!==contaNome){prov.conta=contaNome;ch=true;}
    if(ch)save();
  }
}
function ensureProvisoesFaturas(ini,fim){
  db.cartoes.filter(c=>c.ativo&&c.conta_id).forEach(c=>{
    let d=new Date((ini||new Date().toISOString().slice(0,7)+'-01')+'T12:00');
    const end=new Date((fim||ini||new Date().toISOString().slice(0,7)+'-01')+'T12:00');
    d.setDate(1);
    while(d<=end){ensureProvisaoFatura(c.id,`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);d.setMonth(d.getMonth()+1);}
  });
}
function syncFixoFromLanc(l){if(l.origem!=='fixo'||!l.ref_id)return;const f=db.fixos.find(x=>x.id===l.ref_id);if(!f)return;if(!f.meses)f.meses={};f.meses[ym(l.data)]=l.pago?'pago':undefined;if(!f.meses[ym(l.data)])delete f.meses[ym(l.data)]}
function regenerateParcelLaunches(p){db.lancamentos=db.lancamentos.filter(l=>!(l.origem==='parcelado'&&l.ref_id===p.id));const vp=Number(p.total||0)/Number(p.np||1);for(let i=1;i<=p.np;i++){db.lancamentos.push({id:nid(db.lancamentos),data:addMonths(p.primeira_data||p.data,i-1),desc:`${p.desc} — Parcela ${i}/${p.np}`,tipo:'D',cat_id:p.cat_id,conta:p.conta,valor:vp,obs:p.obs||'parcelado',importado:false,pago:i<=Number(p.pg||0),origem:'parcelado',ref_id:p.id,parcela_num:i,parcela_total:p.np})}}
function rebuildParcelStatusFromLaunch(p){const ls=db.lancamentos.filter(l=>l.origem==='parcelado'&&l.ref_id===p.id);if(ls.length)p.pg=ls.filter(l=>l.pago!==false).length}

function sortableTable(id, headers, rows, empty='Nenhum registro encontrado'){
  if(!window.__sortState)window.__sortState={};
  const st=window.__sortState[id]||{col:0,dir:1};
  const data=[...rows].sort((a,b)=>{const av=a.sort[st.col],bv=b.sort[st.col];const na=parseFloat(av),nb=parseFloat(bv);let r=(!isNaN(na)&&!isNaN(nb))?na-nb:String(av??'').localeCompare(String(bv??''),'pt-BR',{numeric:true,sensitivity:'base'});return r*st.dir});
  return `<table><thead><tr>${headers.map((h,i)=>`<th onclick="sortGrid('${id}',${i})" style="cursor:pointer;user-select:none">${h}${h?` <span style="opacity:.5;font-size:9px">${st.col===i?(st.dir>0?'▲':'▼'):'⇅'}</span>`:''}</th>`).join('')}</tr></thead><tbody>${data.length?data.map(r=>`<tr>${r.cells.join('')}</tr>`).join(''):`<tr><td colspan="${headers.length}"><div class="empty"><big>📭</big>${empty}</div></td></tr>`}</tbody></table>`
}
function sortGrid(id,col){const st=window.__sortState||(window.__sortState={});st[id]=st[id]&&st[id].col===col?{col,dir:st[id].dir*-1}:{col,dir:1};go(page)}

function getProxVencimentos(dias=15){
  const hoje=new Date().toISOString().slice(0,10),fim=addDays(hoje,dias);
  ensureFixedLaunchesBetween(hoje,fim);
  const items=[];
  db.lancamentos.filter(l=>l.pago===false&&l.data>=hoje&&l.data<=fim&&!isCartaoPurchase(l)&&l.tipo!=='Tr'&&l.origem!=='provisao_fatura').forEach(l=>{
    items.push({data:l.data,desc:l.desc,valor:l.valor,tipoStr:l.tipo==='R'?'R':'D',badge:origemTag(l)});
  });
  db.lancamentos.filter(l=>l.origem==='provisao_fatura'&&l.pago===false&&l.data>=hoje&&l.data<=fim).forEach(l=>{
    items.push({data:l.data,desc:l.desc,valor:l.valor,tipoStr:'D',badge:'<span class="tag tag-t txt-xs">💳 fatura</span>'});
  });
  return items.sort((a,b)=>a.data<b.data?-1:1);
}
function calcSaude(){
  const ms3=[-2,-1,0].map(i=>{const d=new Date();d.setDate(1);d.setMonth(d.getMonth()+i);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`});
  const recMedia=ms3.reduce((s,m)=>s+db.lancamentos.filter(l=>l.data?.startsWith(m)&&l.tipo==='R'&&l.pago!==false).reduce((a,l)=>a+l.valor,0),0)/3;
  const depMedia=ms3.reduce((s,m)=>s+db.lancamentos.filter(l=>l.data?.startsWith(m)&&(l.tipo==='D'||l.origem==='provisao_fatura')&&l.pago!==false&&!isCartaoPurchase(l)).reduce((a,l)=>a+l.valor,0),0)/3;
  const saldoLiq=db.contas.filter(c=>c.ativo&&c.tipo!=='Investimento').reduce((s,c)=>s+saldoConta(c.nome),0);
  const saldoInv=db.contas.filter(c=>c.ativo&&c.tipo==='Investimento').reduce((s,c)=>s+saldoConta(c.nome),0);
  const parcelaMes=db.parcelados.reduce((s,p)=>{const r=p.np-p.pg;return r>0?s+(p.total/p.np):s},0);
  const scLiq=Math.min(100,depMedia>0?(saldoLiq/(depMedia*3))*100:100);
  const scPoup=saldoInv+saldoLiq>0?Math.min(100,(saldoInv/(saldoInv+saldoLiq))*500):0;
  const scEndiv=recMedia>0?Math.max(0,100-(parcelaMes/recMedia/0.3)*100):100;
  const scSobra=recMedia>0?Math.min(100,Math.max(0,((recMedia-depMedia)/recMedia/0.1)*100)):0;
  const score=Math.round(scLiq*0.3+scPoup*0.2+scEndiv*0.25+scSobra*0.25);
  const [nivel,cor]=score>=90?['Excelente','#00875a']:score>=75?['Boa','#1a56db']:score>=60?['Regular','#b45309']:score>=40?['Atenção','#c9283e']:['Crítica','#991b1b'];
  return{score,nivel,cor,scLiq,scPoup,scEndiv,scSobra,recMedia,depMedia,saldoLiq,saldoInv,parcelaMes};
}
function getAporteInfo(){
  const hoje=new Date().toISOString().slice(0,10),fim=addDays(hoje,45);
  const contas=db.contas.filter(c=>c.ativo&&c.tipo!=='Investimento');
  if(!contas.length)return null;
  let saldo=contas.reduce((s,c)=>s+saldoConta(c.nome,hoje,true),0);
  let minSaldo=saldo,minDia=null;
  let d=new Date(hoje+'T12:00');d.setDate(d.getDate()+1);
  while(d.toISOString().slice(0,10)<=fim){
    const ds=d.toISOString().slice(0,10);
    db.lancamentos.filter(l=>l.data===ds&&contas.some(c=>c.nome===l.conta)).forEach(l=>{saldo+=signedValue(l)});
    if(saldo<minSaldo){minSaldo=saldo;minDia=ds;}
    d.setDate(d.getDate()+1);
  }
  if(minSaldo>=0)return null;
  return{aporte:Math.ceil(Math.abs(minSaldo)+200),diaAporte:addDays(minDia,-3),diaCritico:minDia};
}
function getCatPaiStats(lancamentos){
  const stats={};
  lancamentos.filter(l=>(l.tipo==='D'||l.origem==='provisao_fatura')&&!isCartaoPurchase(l)&&l.pago!==false).forEach(l=>{
    const cat=l.origem==='provisao_fatura'?{id:'_fat',nome:'Faturas de Cartão',icone:'💳',parent_id:null}:catById(l.cat_id);
    const pai=cat.parent_id?catById(cat.parent_id):cat;
    const pid=pai.id||'_outros';
    if(!stats[pid])stats[pid]={pai,total:0,filhas:{}};
    stats[pid].total+=l.valor;
    if(cat.id!==pai.id){const cid=cat.id;if(!stats[pid].filhas[cid])stats[pid].filhas[cid]={cat,total:0};stats[pid].filhas[cid].total+=l.valor;}
  });
  return Object.values(stats).sort((a,b)=>b.total-a.total);
}

    rects.push(`<text x="${cx+bW}" y="${H-2}" text-anchor="middle" font-size="9" fill="var(--ink3)">${m.nome}${m.isCur?'*':''}</text>`);
  });
  return`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:${H}px">${rects.join('')}</svg>

    <span><span style="background:#fca5a5;width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:2px"></span>Prevista</span>
    <span style="color:var(--ink3)">*mês atual</span>
  </div>`;
}

// ── LANÇAMENTOS ──────────────────────────────────────────────────────
let lFiltTipo='',lFiltMes='',lFiltConta='',lFiltCat='',lSearch='',lDtIni='',lDtFim='',lPago='';

// Initialize default month filter to current month
(function(){const t=new Date().toISOString().slice(0,7);lFiltMes=t;lDtIni=t+'-01';const [y,m]=t.split('-').map(Number);lDtFim=new Date(y,m,0).toISOString().slice(0,10)})();


// ── HELPER: detecta compra em cartão (oculta de Lançamentos) ─────────
function isCartaoPurchase(l){
  return !!db.cartoes.find(c=>c.nome===l.conta) && l.tipo==='D' && l.origem!=='pagamento_fatura';
}

// Retorna linhas sintéticas de fatura para o período ini-fim
function getFaturasSinteticas(ini, fim){
  const rows=[];
  db.cartoes.filter(c=>c.ativo).forEach(c=>{
    // Verifica os últimos 18 meses para cobrir qualquer período
    for(let i=17;i>=-2;i--){
      const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-i);
      const mes=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      const datas=getFaturaVencimento(c.id,mes);
      if(!datas)continue;
      if(datas.vencimento<ini||datas.vencimento>fim)continue;
      const transacoes=getFaturaTransacoes(c.id,mes);
      const total=transacoes.reduce((s,l)=>s+Number(l.valor||0),0);
      if(total===0)continue;
      const fp=db.faturas_pagas.find(x=>x.cartao_id===c.id&&x.mes===mes);
      rows.push({cartaoId:c.id,cartaoNome:c.nome,cor:c.cor,mes,total,fp,vencimento:datas.vencimento,fechamento:datas.fechamento,transacoes});
    }
  });
  return rows;
}

function pLanc(){
  const hoje=new Date().toISOString().slice(0,10);
  const ini=lDtIni||(lFiltMes?lFiltMes+'-01':`${hoje.slice(0,7)}-01`);
  const fim=lDtFim||(lFiltMes?(lFiltMes+'-'+String(monthEnd(lFiltMes)).padStart(2,'0')):hoje);
  ensureFixedLaunchesBetween(ini,fim);
  ensureProvisoesFaturas(ini,fim);

  // Exclui compras de cartão — ficam na gestão de faturas; provisao_fatura aparece como débito na conta
  let list=[...db.lancamentos].filter(l=>!isCartaoPurchase(l)&&l.origem!=='pagamento_fatura');
  if(lFiltTipo)list=list.filter(l=>l.tipo===lFiltTipo);
  if(lFiltMes)list=list.filter(l=>l.data&&l.data.startsWith(lFiltMes));
  if(lDtIni)list=list.filter(l=>l.data>=lDtIni);
  if(lDtFim)list=list.filter(l=>l.data<=lDtFim);
  if(lFiltConta)list=list.filter(l=>l.conta===lFiltConta);
  if(lFiltCat)list=list.filter(l=>l.cat_id==lFiltCat);
  if(lPago)list=list.filter(l=>lPago==='pago'?l.pago!==false:l.pago===false);
  if(lSearch)list=list.filter(l=>String(l.desc).toLowerCase().includes(lSearch.toLowerCase()));
  list.sort((a,b)=>a.data<b.data?1:a.data>b.data?-1:0);

  // Faturas sintéticas de cartão para o período
  const fatSin=(!lFiltTipo||lFiltTipo==='D')?getFaturasSinteticas(ini,fim).filter(f=>{
    if(lSearch&&!f.cartaoNome.toLowerCase().includes(lSearch.toLowerCase()))return false;
    if(lPago==='pago'&&!f.fp)return false;
    if(lPago==='pendente'&&f.fp)return false;
    if(lFiltConta&&f.cartaoNome!==lFiltConta)return false;
    return true;
  }):[];

  const meses=[...new Set(db.lancamentos.map(l=>l.data?l.data.slice(0,7):null).filter(Boolean))].sort().reverse();

  // KPIs incluem faturas de cartão como despesa
  const rec=list.filter(l=>l.tipo==='R').reduce((s,l)=>s+l.valor,0);
  const dep=list.filter(l=>l.tipo==='D').reduce((s,l)=>s+l.valor,0)+fatSin.reduce((s,f)=>s+f.total,0);
  const inv=list.filter(l=>l.tipo==='I').reduce((s,l)=>s+l.valor,0);
  const pend=list.filter(l=>l.pago===false).reduce((s,l)=>s+l.valor,0)+fatSin.filter(f=>!f.fp).reduce((s,f)=>s+f.total,0);

  // Rows de lançamentos normais
  const rows=list.map(l=>{
    const cat=catById(l.cat_id);
    const saldoDia=isContaBancaria(l.conta)?R(saldoContaDia(l.conta,l.data)):'—';
    const parcInfo=l.parcela_num?`<br><span class="txt-xs" style="color:var(--purple)">Parcela ${l.parcela_num}/${l.parcela_total}</span>`:'';
    return{sort:[l.data,l.desc,catFullName(cat),l.conta,l.tipo,l.valor,l.pago!==false?1:0,saldoDia,l.origem||'manual',''],cells:[
      `<td class="mono txt-xs">${fdt(l.data)}</td>`,
      `<td>${esc(l.desc)}${parcInfo}</td>`,
      `<td>${esc(catLabel(cat))}</td>`,
      `<td>${esc(l.conta)}</td>`,
      `<td>${tipoTag(l.tipo)}</td>`,
      `<td class="${vClass(l.tipo,l.transfer_out)}">${vSign(l.tipo,l.transfer_out)}${R(l.valor)}</td>`,
      `<td><button class="btn btn-xs ${l.pago!==false?'btn-green':'btn-ghost'}" onclick="togglePagoLanc(${l.id})">${l.pago!==false?'✓ Pago':'Pendente'}</button></td>`,
      `<td class="mono txt-xs">${saldoDia}</td>`,
      `<td>${origemTag(l)}</td>`,
      `<td><div style="display:flex;gap:3px"><button class="ico-btn" onclick="openLancModal(${l.id})">✏️</button><button class="ico-btn" onclick="delLanc(${l.id})">🗑</button></div></td>`
    ]};
  });

  // Rows sintéticas de fatura
  const fatRows=fatSin.map(f=>{
    const pago=!!f.fp;
    const hoje2=new Date().toISOString().slice(0,10);
    const diasVenc=Math.ceil((new Date(f.vencimento)-new Date(hoje2))/(1000*60*60*24));
    const urgente=!pago&&diasVenc>=0&&diasVenc<=5;
    const vencida=!pago&&diasVenc<0;
    const statusTag=pago
      ?`<span class="tag tag-g">✓ Pago</span>`
      :urgente?`<span class="tag tag-a">⚡ Vence em ${diasVenc}d</span>`
      :vencida?`<span class="tag tag-r">⚠ Vencida</span>`
      :`<span class="tag tag-x">Pendente</span>`;
    const acoes=pago
      ?`<button class="btn btn-xs btn-ghost" onclick="openFaturaCartao(${f.cartaoId},'${f.mes}')">Ver fatura</button>`
      :`<div style="display:flex;gap:3px"><button class="btn btn-xs btn-ghost" onclick="openFaturaCartao(${f.cartaoId},'${f.mes}')">Ver</button><button class="btn btn-xs btn-dark" onclick="openPagarFaturaModal(${f.cartaoId},'${f.mes}',${f.total})">Pagar</button></div>`;
    return{sort:[f.vencimento,`Fatura ${f.cartaoNome}`,'Cartão',f.cartaoNome,'D',f.total,pago?1:0,'—','fatura',''],cells:[
      `<td class="mono txt-xs">${fdt(f.vencimento)}</td>`,
      `<td><span style="display:inline-flex;align-items:center;gap:6px"><span class="dot" style="background:${f.cor}"></span><strong>Fatura ${esc(f.cartaoNome)}</strong></span><br><span class="txt-xs" style="color:var(--ink3)">${f.transacoes.length} compra(s) · fecha ${fdt(f.fechamento)}</span></td>`,
      `<td><span class="tag tag-r" style="font-size:10px">💳 Cartão</span></td>`,
      `<td>${esc(f.cartaoNome)}</td>`,
      `<td><span class="tag tag-r">Despesa</span></td>`,
      `<td class="v-neg">-${R(f.total)}</td>`,
      `<td>${statusTag}</td>`,
      `<td class="mono txt-xs">—</td>`,
      `<td><span class="tag tag-p txt-xs">fatura</span></td>`,
      `<td>${acoes}</td>`
    ]};
  });

  const allRows=[...rows,...fatRows];

  set(`<div class="kpi-row" style="grid-template-columns:repeat(5,1fr)"><div class="kpi c-g"><div class="kpi-lbl">Receitas</div><div class="kpi-val">${R(rec)}</div></div><div class="kpi c-r"><div class="kpi-lbl">Despesas</div><div class="kpi-val">${R(dep)}</div></div><div class="kpi c-b"><div class="kpi-lbl">Investimentos</div><div class="kpi-val">${R(inv)}</div></div><div class="kpi ${(rec-dep)>=0?'c-g':'c-r'}"><div class="kpi-lbl">Saldo Filtrado</div><div class="kpi-val">${R(rec-dep)}</div></div><div class="kpi c-a"><div class="kpi-lbl">A pagar</div><div class="kpi-val">${R(pend)}</div></div></div>
  <div class="tip tip-blue" style="margin-bottom:12px">💳 Compras no cartão ficam na <strong>Gestão de Faturas</strong>. Aqui aparece apenas a fatura consolidada por cartão.</div>
  <div class="card">
    <div class="card-head">
      <h3>Lançamentos <span class="tag tag-x" style="font-size:11px;margin-left:4px">${allRows.length}</span></h3>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="exportScreenCSV('lancamentos')">CSV</button>
        <button class="btn btn-ghost btn-sm" onclick="exportAllExcel()">Excel</button>
        <button class="btn btn-ghost btn-sm" onclick="go('importar')">Importar</button>
        <button class="btn btn-green btn-sm" onclick="openLancModal()">+ Novo</button>
      </div>
    </div>
    <div class="card-body" style="padding:12px 16px">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <input type="text" placeholder="🔍 Buscar..." style="width:160px" value="${esc(lSearch)}" oninput="lSearch=this.value;pLanc()">
        <div style="display:flex;align-items:center;gap:4px">
          <label style="font-size:11px;white-space:nowrap">De:</label>
          <input type="date" value="${lDtIni}" onchange="lDtIni=this.value;lFiltMes='';pLanc()" style="width:145px">
          <label style="font-size:11px;white-space:nowrap">Até:</label>
          <input type="date" value="${lDtFim}" onchange="lDtFim=this.value;lFiltMes='';pLanc()" style="width:145px">
        </div>
        <select onchange="lFiltMes=this.value;if(this.value){lDtIni=this.value+'-01';var p=this.value.split('-');lDtFim=new Date(+p[0],+p[1],0).toISOString().slice(0,10);}else{lDtIni='';lDtFim='';}pLanc()">
          <option value="">Todos os meses</option>
          ${meses.map(m=>`<option value="${m}" ${lFiltMes===m?'selected':''}>${m}</option>`).join('')}
        </select>
        <select onchange="lFiltTipo=this.value;pLanc()"><option value="">Todos tipos</option>${[['R','Receita'],['D','Despesa'],['I','Investimento'],['Res','Resgate'],['Tr','Transferência']].map(([v,n])=>`<option value="${v}" ${lFiltTipo===v?'selected':''}>${n}</option>`).join('')}</select>
        <select onchange="lPago=this.value;pLanc()"><option value="">Pago e pendente</option><option value="pago" ${lPago==='pago'?'selected':''}>Pago</option><option value="pendente" ${lPago==='pendente'?'selected':''}>Pendente</option></select>
        <select onchange="lFiltConta=this.value;pLanc()"><option value="">Todas contas/cartões</option>${[...db.contas.filter(c=>c.ativo).sort(cmpName).map(c=>c.nome),...db.cartoes.filter(c=>c.ativo).sort(cmpName).map(c=>c.nome)].map(c=>`<option value="${esc(c)}" ${lFiltConta===c?'selected':''}>${esc(c)}</option>`).join('')}</select>
        <select onchange="lFiltCat=this.value;pLanc()"><option value="">Todas categorias</option>${sortedCats().map(c=>`<option value="${c.id}" ${lFiltCat==c.id?'selected':''}>${esc(catLabel(c))}</option>`).join('')}</select>
        <button class="btn btn-ghost btn-sm" onclick="lFiltTipo='';lFiltMes='';lFiltConta='';lFiltCat='';lSearch='';lDtIni='';lDtFim='';lPago='';pLanc()">✕ Limpar</button>
      </div>
    </div>
    <div class="tbl-wrap">${sortableTable('lancamentos',['Data','Descrição','Categoria','Conta','Tipo','Valor','Status','Saldo conta/dia','Origem','Ações'],allRows,'Nenhum lançamento encontrado')}</div>
  </div>`);
}

function openLancModal(eid, reuseParams=false){
  const l=eid?db.lancamentos.find(x=>x.id===eid):null;
  const dp=!l&&reuseParams?_lastLancParams:null; // defaults para "Salvar e Novo"
  const selTipo=l?l.tipo:(dp?.tipo||'D');
  const isTr=selTipo==='Tr';
  const selConta=l?(isTr?null:l.conta):(dp?.conta||null);
  const selCat=l?l.cat_id:(dp?.cat_id||null);
  const selPago=l?l.pago!==false:(dp?.pago!==false??true);
  const contasOpts=(sel)=>db.contas.filter(c=>c.ativo).sort(cmpName).map(c=>`<option ${sel&&sel===c.nome?'selected':''}>${esc(c.nome)}</option>`).join('');
  const initCatFiltro=selTipo==='D'||selTipo==='I'?'D':selTipo==='R'||selTipo==='Res'?'R':null;
  const initCats=isTr?[]:initCatFiltro?sortedCats(initCatFiltro):sortedCats();
  showM(l?'Editar Lançamento':'Novo Lançamento','modal-lg',`
    <div class="fgrid">
      <div class="fg"><label>Data *</label><input type="date" id="f-dt" value="${l?l.data:new Date().toISOString().slice(0,10)}"></div>
      <div class="fg"><label>Tipo *</label><select id="f-tp" onchange="lancTipoChange(this.value)">${[['R','Receita'],['D','Despesa'],['I','Investimento'],['Res','Resgate'],['Tr','Transferência']].map(([v,n])=>`<option value="${v}" ${selTipo===v?'selected':''}>${n}</option>`).join('')}</select></div>
      <div class="fg full"><label>Descrição</label><input type="text" id="f-ds" value="${esc(l?l.desc:'')}" placeholder="Deixe em branco para gerar automaticamente"></div>
      <div class="fg" id="fg-cat"><label>Categoria *</label><select id="f-ct">${initCats.map(c=>`<option value="${c.id}" ${selCat==c.id?'selected':''}>${esc(catLabel(c))}</option>`).join('')}</select></div>
      <div class="fg" id="fg-conta-normal" style="${isTr?'display:none':''}"><label>Conta / Cartão *</label><select id="f-cn"><optgroup label="Contas">${db.contas.filter(c=>c.ativo).sort(cmpName).map(c=>`<option ${selConta===c.nome?'selected':''}>${esc(c.nome)}</option>`).join('')}</optgroup><optgroup label="Cartões">${db.cartoes.filter(c=>c.ativo).sort(cmpName).map(c=>`<option ${selConta===c.nome?'selected':''}>${esc(c.nome)}</option>`).join('')}</optgroup></select></div>
      <div class="fg" id="fg-conta-ori" style="${isTr?'':'display:none'}"><label>Conta Origem *</label><select id="f-cn-ori">${contasOpts(l&&isTr&&l.transfer_out?l.conta:l&&isTr&&!l.transfer_out?l.transfer_partner:dp?.ori||null)}</select></div>
      <div class="fg" id="fg-conta-dst" style="${isTr?'':'display:none'}"><label>Conta Destino *</label><select id="f-cn-dst">${contasOpts(l&&isTr&&!l.transfer_out?l.conta:l&&isTr&&l.transfer_out?l.transfer_partner:dp?.dst||null)}</select></div>
      <div class="fg"><label>Valor (R$) *</label><input type="number" id="f-vl" step="0.01" min="0" value="${l?l.valor:''}" placeholder="0,00"></div>
      <div class="fg"><label>Status</label><select id="f-pg"><option value="true" ${selPago?'selected':''}>✓ Pago</option><option value="false" ${!selPago?'selected':''}>⏳ Pendente</option></select></div>
      <div class="fg full"><label>Observação</label><input type="text" id="f-ob" value="${esc(l?l.obs:'')}" placeholder="Opcional"></div>
      <div class="fg full" id="fg-fatura-info" style="display:none">
        <div class="tip tip-blue" id="f-fatura-tip"></div>
      </div>
    </div>`,
  `<button class="btn btn-ghost" onclick="closeM()">Cancelar</button><button class="btn btn-ghost" onclick="saveLanc(${eid||0},true)">${l?'Salvar e Duplicar':'+ Salvar e Novo'}</button><button class="btn btn-dark" onclick="saveLanc(${eid||0})">${l?'Salvar':'Adicionar'}</button>`);
  // Exibe/oculta campos de transferência
  setTimeout(()=>{lancTipoChange(document.getElementById('f-tp')?.value||'D');},10);
  // Atualiza preview da fatura ao mudar conta ou data
  setTimeout(()=>{
    const upd=()=>{
      const cn=document.getElementById('f-cn')?.value;
      const dt=document.getElementById('f-dt')?.value;
      const tip=document.getElementById('f-fatura-tip');
      const wrap=document.getElementById('fg-fatura-info');
      if(!tip||!wrap)return;
      const cartao=db.cartoes.find(x=>x.nome===cn);
      if(cartao&&dt){
        const f=faturaCartao(cn,dt);

function handleImportFile(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();

function parseOFX(txt){const rows=[];const stmtTrn=txt.match(/<STMTTRN>([\s\S]*?)<\/STMTTRN>/gi)||txt.match(/\<STMTTRN\>([\s\S]*?)(?=<STMTTRN>|<\/BANKTRANLIST>)/gi)||[];function tag(block,t){const m=block.match(new RegExp('<'+t+'>([^<\\n\\r]+)','i'));return m?m[1].trim():''}stmtTrn.forEach(block=>{let rawDate=tag(block,'DTPOSTED')||tag(block,'DTUSER'),amt=parseFloat(tag(block,'TRNAMT')||'0'),memo=(tag(block,'MEMO')||tag(block,'NAME')||'Sem descrição').replace(/&amp;/g,'&'),fitid=tag(block,'FITID')||String(Date.now()+Math.random()),data='';if(rawDate.length>=8)data=rawDate.slice(0,4)+'-'+rawDate.slice(4,6)+'-'+rawDate.slice(6,8);rows.push({data,desc:memo,valor:Math.abs(amt),tipo:amt>=0?'R':'D',fitid})});return rows}
function findCatByNome(nome){
  if(!nome)return null;
  const n=nome.trim().toLowerCase();
  // Formato "Pai / Filha"
  if(n.includes('/')){
    const [pn,fn]=n.split('/').map(s=>s.trim());
    const pai=db.categorias.find(c=>c.nome.toLowerCase()===pn&&!c.parent_id);
    if(pai){const filha=db.categorias.find(c=>c.nome.toLowerCase()===fn&&c.parent_id===pai.id);if(filha)return filha;}
  }
  // Somente nome (filha ou pai)
  return db.categorias.find(c=>c.nome.toLowerCase()===n)||null;
}
function parseCSV(txt){
  const TIPOS=['R','D','I','RES','TR'];
  return txt.split(/\r?\n/).filter(l=>l.trim()&&!l.startsWith('#')).map((line,i)=>{
    if(i===0&&line.toLowerCase().includes('data'))return null;
    const cols=line.split(';');
    if(cols.length<3)return null;
    const valor=Math.abs(parseFloat((cols[2]||'0').replace(',','.')));
    if(isNaN(valor))return null;
    // col[3] pode ser tipo (R/D/I/RES/TR) ou categoria (qualquer outro texto)
    const c3=(cols[3]||'').trim().toUpperCase();
    const isTipo=TIPOS.includes(c3);
    const tipo=isTipo?(c3==='R'?'R':c3==='I'?'I':c3==='RES'?'Res':c3==='TR'?'Tr':'D'):'D';
    const catNome=isTipo?(cols[4]||'').trim():(cols[3]||'').trim();
    return{data:(cols[0]||'').trim(),desc:(cols[1]||'').trim(),valor,tipo,catNome};
  }).filter(Boolean);
}
function confirmImport(){
  const conta=fv('imp-conta')||db.contas[0]?.nome||'';
  const defaultCatId=parseInt(fv('imp-cat'))||db.categorias.find(c=>c.tipo==='D')?.id||1;
  const isCartao=!!db.cartoes.find(c=>c.nome===conta);
  let added=0,skip=0,catNaoEncontrada=[];
  importPreview.forEach(r=>{
    if(r.fitid&&db.lancamentos.find(l=>l.fitid===r.fitid)){skip++;return}
    const tipo=isCartao?'D':r.tipo;
    const catResolvida=r.catNome?findCatByNome(r.catNome):null;
    if(r.catNome&&!catResolvida&&!catNaoEncontrada.includes(r.catNome))catNaoEncontrada.push(r.catNome);
    const cat_id=catResolvida?catResolvida.id:defaultCatId;
    db.lancamentos.push({id:nid(db.lancamentos),data:r.data,desc:r.desc,tipo,cat_id,conta:r.conta||conta,valor:r.valor,obs:'',importado:true,fitid:r.fitid||null,pago:true,origem:'importado'});
    added++;
  });
  save();
  importPreview=[];
  let msg=`${added} lançamento(s) importado(s)${skip>0?` · ${skip} duplicata(s) ignorada(s)`:''}`;
  if(catNaoEncontrada.length)msg+=`\n\n⚠️ Categorias não encontradas (usou padrão):\n${catNaoEncontrada.join(', ')}`;
  if(isCartao)msg+='\n\n💳 Compras adicionadas à fatura conforme data de cada transação.';
  alert(msg);
  if(isCartao){
    // Atualiza provisões para refletir novos lançamentos
    const cartao=db.cartoes.find(c=>c.nome===conta);
    if(cartao){for(let i=-1;i<=2;i++){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()+i);ensureProvisaoFatura(cartao.id,`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`)}}
    go('faturas');
  } else {
    go('lancamentos');
  }
}

function pFixos(){const meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],yy=new Date().getFullYear(),mm=new Date().getMonth(),mk=`${yy}-${String(mm+1).padStart(2,'0')}`;ensureFixedLaunchesForMonth(mk);const total=db.fixos.filter(f=>f.ativo).reduce((s,f)=>s+f.valor,0),pago=db.fixos.filter(f=>f.ativo&&f.meses&&f.meses[mk]==='pago').reduce((s,f)=>s+f.valor,0);

    const fqLabel=FREQ_LABEL[f.frequencia||'mensal']||'Mensal';
    const inicioInfo=f.data_inicio?`${fdt(f.data_inicio)}<br><span style="color:var(--ink3)">${fqLabel}</span>`:fqLabel;
    return{sort:[f.desc,f.conta,f.data_inicio||'',f.valor,...meses.map((_,i)=>f.meses?.[`${yy}-${String(i+1).padStart(2,'0')}`]||''),''],cells:[`<td><strong>${esc(f.desc)}</strong><br><span class="txt-xs">${esc(catLabel(catById(f.cat_id)))}</span></td>`,`<td>${esc(f.conta)}</td>`,`<td class="txt-xs" style="text-align:center;white-space:nowrap">${inicioInfo}</td>`,`<td class="v-neg">${R(f.valor)}</td>`,mCols,`<td><div style="display:flex;gap:3px"><button class="ico-btn" onclick="openFixoModal(${f.id})">✏️</button><button class="ico-btn" onclick="toggleFixoAtivo(${f.id})">${f.ativo?'⏸':'▶'}</button><button class="ico-btn" onclick="delFixo(${f.id})">🗑</button></div></td>`]};
  });
  set(`<div class="kpi-row" style="grid-template-columns:repeat(4,1fr)"><div class="kpi c-t"><div class="kpi-lbl">Total Mensal</div><div class="kpi-val">${R(total)}</div></div><div class="kpi c-g"><div class="kpi-lbl">Pago (${meses[mm]})</div><div class="kpi-val">${R(pago)}</div></div><div class="kpi c-r"><div class="kpi-lbl">Pendente (${meses[mm]})</div><div class="kpi-val">${R(total-pago)}</div></div><div class="kpi c-b"><div class="kpi-lbl">Itens ativos</div><div class="kpi-val">${db.fixos.filter(f=>f.ativo).length}</div></div></div>

}
function toggleFixoMes(id,k){const f=db.fixos.find(x=>x.id===id);if(!f)return;if(!f.meses)f.meses={};const c=f.meses[k];f.meses[k]=c==='pago'?'cancelado':c==='cancelado'?undefined:'pago';if(!f.meses[k])delete f.meses[k];ensureFixedLaunchesForMonth(k);const l=db.lancamentos.find(x=>x.origem==='fixo'&&x.ref_id===id&&ym(x.data)===k);if(l)l.pago=f.meses[k]==='pago';save();pFixos()}
function fixoFreqChange(v){
  // Atualiza label da data conforme frequência
  const lbl=document.getElementById('x-di-lbl');
  if(lbl){
    if(v==='diario')lbl.textContent='Data de início';
    else if(v==='semanal'||v==='quinzenal')lbl.textContent='Data de início do ciclo';
    else lbl.textContent='Data da 1ª cobrança';
  }
  setTimeout(fixoCartaoPreview,10);
}
function fixoCartaoPreview(){
  const cn=fv('x-cn');
  const cartao=db.cartoes.find(x=>x.nome===cn);
  const tip=document.getElementById('x-fatura-tip'),wrap=document.getElementById('fg-x-fatura-tip');
  if(!tip||!wrap)return;
  if(!cartao){wrap.style.display='none';return;}
  const dataRef=fv('x-di')||new Date().toISOString().slice(0,10);

  const f=faturaCartao(cn,dataRef);

  const vl=parseFloat(fv('x-vl'))||0;
  wrap.style.display='';
  tip.innerHTML=`💳 A 1ª cobrança entra na fatura com fechamento em <strong>${fdt(f.fechamento)}</strong> e vencimento em <strong>${fdt(f.vencimento)}</strong>${vl?` — valor na fatura: <strong class="v-neg">${R(vl)}</strong>`:''}`;
}
function openFixoModal(eid){

  setTimeout(fixoCartaoPreview,50);

function saveFixo(eid,andNew){
  const ds=fv('x-ds').trim(),fq=fv('x-fq')||'mensal',ct=parseInt(fv('x-ct')),cn=fv('x-cn'),vl=parseFloat(fv('x-vl')),rp=parseInt(fv('x-rp'))||0;
  const di=fv('x-di')||new Date().toISOString().slice(0,10);
  if(!ds||!vl||!di){alert('Preencha os campos obrigatórios.');return}
  // Para freq mensais+, dia do mês vem da data de início
  const da=fq==='diario'?1:parseInt(di.slice(8,10))||1;
  if(eid){
    const i=db.fixos.findIndex(f=>f.id===eid);
    const old=db.fixos[i];
    db.fixos[i]={...old,desc:ds,frequencia:fq,cat_id:ct,conta:cn,dia:da,valor:vl,repetir_meses:rp,data_inicio:di};
    if(old.frequencia!==fq||old.valor!==vl||old.data_inicio!==di){
      db.lancamentos=db.lancamentos.filter(l=>!(l.origem==='fixo'&&l.ref_id===eid&&l.pago===false));
    }
  } else {
    db.fixos.push({id:nid(db.fixos),desc:ds,frequencia:fq,cat_id:ct,conta:cn,dia:da,valor:vl,ativo:true,meses:{},repetir_meses:rp,data_inicio:di});
  }
  save();closeM();if(andNew)openFixoModal();else pFixos();
}

function saveCartao(eid,andNew){const nm=fv('k-nm').trim(),bd=fv('k-bd'),ct=parseInt(fv('k-ct'))||null,fc=parseInt(fv('k-fc'))||1,vc=parseInt(fv('k-vc'))||10,lm=parseFloat(fv('k-lm'))||0,cor=fv('k-cor');if(!nm||!lm){alert('Preencha os campos obrigatórios.');return}if(eid){const i=db.cartoes.findIndex(c=>c.id===eid),old=db.cartoes[i].nome;db.cartoes[i]={...db.cartoes[i],nome:nm,bandeira:bd,conta_id:ct,fechamento:fc,vencimento:vc,limite:lm,cor};db.lancamentos.forEach(l=>{if(l.conta===old)l.conta=nm})}else db.cartoes.push({id:nid(db.cartoes),nome:nm,bandeira:bd,conta_id:ct,fechamento:fc,vencimento:vc,limite:lm,cor,ativo:true});save();closeM();if(andNew)openCartaoModal();else pCartoes()}
function toggleCartaoAtivo(id){const c=db.cartoes.find(x=>x.id===id);if(c){c.ativo=!c.ativo;save();pCartoes()}}
function delCartao(id){
  if(!confirm('Excluir cartão? Os lançamentos vinculados a ele (compras e pagamentos de fatura) serão removidos.'))return;
  // Remove faturas_pagas e pagamentos de fatura relacionados
  db.faturas_pagas=db.faturas_pagas.filter(x=>x.cartao_id!==id);
  db.lancamentos=db.lancamentos.filter(l=>!(l.cartao_id===id&&(l.origem==='pagamento_fatura'||l.origem==='provisao_fatura')));
  // Remove lançamentos de compras no cartão
  const c=db.cartoes.find(x=>x.id===id);
  if(c) db.lancamentos=db.lancamentos.filter(l=>l.conta!==c.nome);
  db.cartoes=db.cartoes.filter(x=>x.id!==id);
  save();pCartoes();
}

// ── GESTÃO DE FATURA DO CARTÃO ─────────────────────────────────────
let _fatCartaoId = null;
let _fatMes = null;

function getFaturaTransacoes(cartaoId, mes){
  const c = db.cartoes.find(x=>x.id===cartaoId);
  if(!c) return [];
  const [y,m] = mes.split('-').map(Number);
  // Janela: após fechamento do mês anterior até fechamento deste mês
  const fechAnt = new Date(y, m-2, c.fechamento, 12);
  const fechAtu = new Date(y, m-1, c.fechamento, 12);
  return db.lancamentos.filter(l =>
    l.conta===c.nome && l.tipo==='D' &&
    l.data > fechAnt.toISOString().slice(0,10) &&
    l.data <= fechAtu.toISOString().slice(0,10)
  );
}

function getFaturaVencimento(cartaoId, mes){
  const c = db.cartoes.find(x=>x.id===cartaoId);
  if(!c) return null;
  const [fY,fM] = mes.split('-').map(Number); // fM = mês de fechamento (1-based)
  // Fechamento: dia c.fechamento do mês da fatura
  const diaFech = String(Math.min(c.fechamento, new Date(fY,fM,0).getDate())).padStart(2,'0');
  // Vencimento: se vencimento < fechamento → mês seguinte ao fechamento
  let vY=fY, vM=fM;
  if(c.vencimento<c.fechamento){ vM++; if(vM>12){vM=1;vY++;} }
  const diaVenc = String(Math.min(c.vencimento, new Date(vY,vM,0).getDate())).padStart(2,'0');
  return {
    vencimento: `${vY}-${String(vM).padStart(2,'0')}-${diaVenc}`,
    fechamento: `${fY}-${String(fM).padStart(2,'0')}-${diaFech}`
  };
}

// Alias para compatibilidade — redireciona para tela full-page
function openFaturaCartao(cartaoId, mes){
  _fatCartaoId = cartaoId;
  _fatMes = mes || new Date().toISOString().slice(0,7);
  go('faturas');
}

function openPagarFaturaModal(cartaoId, mes, total){
  const c = db.cartoes.find(x=>x.id===cartaoId);
  const datas = getFaturaVencimento(cartaoId, mes);
  const contasOpts = db.contas.filter(x=>x.ativo&&x.tipo!=='Investimento').sort(cmpName)
    .map(x=>`<option value="${esc(x.nome)}">${esc(x.nome)} (${R(saldoConta(x.nome))})</option>`).join('');
  showM(`Pagar Fatura — ${esc(c.nome)} ${mes}`,'modal-lg',`
    <div class="fgrid">
      <div class="fg full"><div class="tip tip-blue">O pagamento gerará um débito na conta selecionada e marcará a fatura como paga. As compras desta fatura passarão para <strong>pago</strong>.</div></div>
      <div class="fg"><label>Data do Pagamento *</label><input type="date" id="pf-dt" value="${datas?datas.vencimento:new Date().toISOString().slice(0,10)}"></div>
      <div class="fg"><label>Valor a pagar (R$) *</label><input type="number" id="pf-vl" step="0.01" value="${total.toFixed(2)}"></div>
      <div class="fg full"><label>Conta de Débito *</label><select id="pf-cn">${contasOpts}</select></div>
      <div class="fg full"><label>Observação</label><input type="text" id="pf-ob" value="Pagamento fatura ${esc(c.nome)} ${mes}" placeholder="Opcional"></div>
    </div>`,
  `<button class="btn btn-ghost" onclick="closeM();pFaturas()">Voltar</button>
   <button class="btn btn-dark" onclick="savePagarFatura(${cartaoId},'${mes}')">✓ Confirmar Pagamento</button>`);
}

function savePagarFatura(cartaoId, mes){
  const c = db.cartoes.find(x=>x.id===cartaoId);
  const dt=fv('pf-dt'), vl=parseFloat(fv('pf-vl')), cn=fv('pf-cn'), ob=fv('pf-ob');
  if(!dt||!vl||!cn){alert('Preencha todos os campos.');return}
  db.faturas_pagas = db.faturas_pagas.filter(x=>!(x.cartao_id===cartaoId&&x.mes===mes));
  db.faturas_pagas.push({id:nid(db.faturas_pagas),cartao_id:cartaoId,mes,valor:vl,conta_pagamento:cn,data_pagamento:dt});
  // Atualiza descrição da provisão se informada
  const prov=db.lancamentos.find(l=>l.origem==='provisao_fatura'&&l.cartao_id===cartaoId&&l.fatura_mes===mes);
  if(prov&&ob)prov.desc=ob;
  getFaturaTransacoes(cartaoId, mes).forEach(l=>{l.pago=true});
  save();
  ensureProvisaoFatura(cartaoId, mes); // atualiza/cria provisão como paga na conta certa
  closeM();
  _fatCartaoId=cartaoId; _fatMes=mes;
  go('faturas');
}

function estornarFatura(cartaoId, mes){
  if(!confirm('Estornar pagamento? A provisão volta para pendente na conta vinculada.'))return;
  db.faturas_pagas = db.faturas_pagas.filter(x=>!(x.cartao_id===cartaoId&&x.mes===mes));
  // Remove legados pagamento_fatura se ainda existirem
  db.lancamentos = db.lancamentos.filter(l=>!(l.origem==='pagamento_fatura'&&l.cartao_id===cartaoId&&l.fatura_mes===mes));
  save();
  ensureProvisaoFatura(cartaoId, mes); // reverte provisão para pendente
  pFaturas();
}

// ── FATURA DETALHADA (tela full-page com navegação) ──────────────────
function pFaturas(){
  // Se há um cartão selecionado, mostra detalhe; senão pega o primeiro ativo
  const cards = db.cartoes.filter(c=>c.ativo);
  if(!cards.length){ set('<div class="empty"><big>💳</big>Nenhum cartão ativo. Cadastre um cartão primeiro.</div>'); return; }

  const cartaoId = _fatCartaoId || cards[0].id;
  const mes = _fatMes || new Date().toISOString().slice(0,7);
  _fatCartaoId = cartaoId; _fatMes = mes;

  const c = db.cartoes.find(x=>x.id===cartaoId);
  if(!c){ _fatCartaoId=cards[0].id; pFaturas(); return; }

  // Garantir lançamentos fixos/parcelados para o mês visualizado
  const mesIni = mes+'-01';
  const mesFim = mes+'-'+String(monthEnd(mes)).padStart(2,'0');
  ensureFixedLaunchesBetween(mesIni, mesFim);
  ensureProvisaoFatura(cartaoId, mes); // mantém provisão atualizada na conta vinculada

  const datas = getFaturaVencimento(cartaoId, mes);
  const transacoes = getFaturaTransacoes(cartaoId, mes);
  const fp = db.faturas_pagas.find(x=>x.cartao_id===cartaoId&&x.mes===mes);
  const total = transacoes.reduce((s,l)=>s+Number(l.valor||0),0);
  const hoje = new Date().toISOString().slice(0,10);

  // Navegação de mês (internamente usa mês de fechamento como chave)
  const [y,m] = mes.split('-').map(Number);
  const prevMes = m===1?`${y-1}-12`:`${y}-${String(m-1).padStart(2,'0')}`;
  const nextMes = m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`;
  // Exibe o mês de VENCIMENTO (quando o usuário paga), não o de fechamento
  const vencStr = datas ? datas.vencimento : `${y}-${String(m).padStart(2,'0')}-01`;
  const [vY,vM] = vencStr.split('-').map(Number);
  const mesNome = new Date(vY, vM-1, 1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

  // Status
  const diasVenc = datas?Math.ceil((new Date(datas.vencimento)-new Date(hoje))/(1000*60*60*24)):0;
  const statusColor = fp?'c-g':diasVenc<0&&total>0?'c-r':diasVenc<=5&&total>0?'c-a':'c-b';
  const statusTxt = fp?`✓ Paga em ${fdt(fp.data_pagamento)}`
    :diasVenc<0&&total>0?`⚠ Vencida há ${Math.abs(diasVenc)}d`
    :diasVenc<=5&&total>0?`⚡ Vence em ${diasVenc}d`
    :total>0?`Aberta — vence ${fdt(datas?.vencimento)}`:'Sem lançamentos';

  // Seletor de cartão
  const cardSel = cards.map(cd=>`<option value="${cd.id}" ${cd.id===cartaoId?'selected':''}>${esc(cd.nome)}</option>`).join('');

  // Agrupar transações
  const manuais  = transacoes.filter(l=>l.origem==='manual'||l.origem==='importado');
  const parc     = transacoes.filter(l=>l.origem==='parcelado');
  const fixos    = transacoes.filter(l=>l.origem==='fixo');

  function rowLanc(l, badge){
    const cat=catById(l.cat_id);
    const pagoBtn = `<button class="btn btn-xs ${l.pago!==false?'btn-green':'btn-ghost'}" onclick="togglePagoLanc(${l.id});pFaturas()">${l.pago!==false?'✓ Pago':'Pendente'}</button>`;
    const acoes = l.origem==='manual'||l.origem==='importado'
      ?`<div style="display:flex;gap:3px"><button class="ico-btn" onclick="openLancModal(${l.id})">✏️</button><button class="ico-btn" onclick="delLancFatura(${l.id})">🗑</button></div>`
      :`<span class="txt-xs" style="color:var(--ink3)">${l.origem}</span>`;
    return `<tr>
      <td class="mono txt-xs">${fdt(l.data)}</td>
      <td>${badge}${esc(l.desc)}${l.parcela_num?`<br><span class="txt-xs" style="color:var(--purple)">Parcela ${l.parcela_num}/${l.parcela_total}</span>`:''}</td>
      <td>${esc(catLabel(cat))}</td>
      <td class="v-neg">${R(l.valor)}</td>
      <td>${pagoBtn}</td>
      <td>${acoes}</td>
    </tr>`;
  }

  function section(title, items, badge, emptyMsg){
    if(!items.length) return `<tr><td colspan="6" style="padding:8px 12px;color:var(--ink3);font-size:12px;background:var(--line2)">${emptyMsg}</td></tr>`;
    return `<tr><td colspan="6" style="padding:6px 12px;background:var(--line2);font-size:11px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.6px">${title} (${items.length}) — ${R(items.reduce((s,l)=>s+l.valor,0))}</td></tr>`+items.sort((a,b)=>a.data<b.data?-1:1).map(l=>rowLanc(l,badge)).join('');
  }

  // Botão de nova compra rápida para este cartão
  const btnNovaCompra = `<button class="btn btn-dark btn-sm" onclick="openLancCartao(${cartaoId})">+ Nova Compra</button>`;
  const btnImport = `<button class="btn btn-ghost btn-sm" onclick="importPreview=[];go('importar');setTimeout(()=>pImport(${cartaoId}),50)">⬆ Importar CSV</button>`;
  const btnPagar = fp
    ?`<button class="btn btn-red btn-sm" onclick="estornarFatura(${cartaoId},'${mes}')">Estornar Pagamento</button>`
    :total>0?`<button class="btn btn-green btn-sm" onclick="openPagarFaturaModal(${cartaoId},'${mes}',${total})">💳 Pagar Fatura — ${R(total)}</button>`:'';

  set(`
  <!-- Cabeçalho de navegação -->
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
    <select onchange="_fatCartaoId=parseInt(this.value);pFaturas()" style="font-size:14px;font-weight:600;border:1.5px solid ${c.cor};border-radius:8px;padding:6px 12px;color:var(--ink);background:var(--surface)">${cardSel}</select>
    <div style="display:flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--line);border-radius:8px;overflow:hidden">
      <button onclick="_fatMes='${prevMes}';pFaturas()" style="padding:7px 14px;border:none;background:transparent;cursor:pointer;font-size:16px;color:var(--ink2)" title="Mês anterior">‹</button>
      <span style="padding:7px 16px;font-size:13px;font-weight:700;min-width:150px;text-align:center;border-left:1px solid var(--line);border-right:1px solid var(--line)">${mesNome.charAt(0).toUpperCase()+mesNome.slice(1)}</span>
      <button onclick="_fatMes='${nextMes}';pFaturas()" style="padding:7px 14px;border:none;background:transparent;cursor:pointer;font-size:16px;color:var(--ink2)" title="Próximo mês">›</button>
    </div>
    ${datas?`<span class="txt-xs" style="color:var(--ink3)">Fecha: ${fdt(datas.fechamento)} · Vence: ${fdt(datas.vencimento)}</span>`:''}
    <div style="margin-left:auto;display:flex;gap:8px">${btnImport} ${btnNovaCompra} ${btnPagar}</div>
  </div>

  <!-- KPIs -->
  <div class="kpi-row" style="grid-template-columns:repeat(5,1fr);margin-bottom:20px">
    <div class="kpi c-r"><div class="kpi-lbl">Total da fatura</div><div class="kpi-val">${R(total)}</div></div>
    <div class="kpi c-b"><div class="kpi-lbl">Compras avulsas</div><div class="kpi-val">${manuais.length}</div><div class="kpi-sub">${R(manuais.reduce((s,l)=>s+l.valor,0))}</div></div>
    <div class="kpi c-p"><div class="kpi-lbl">Parcelados</div><div class="kpi-val">${parc.length}</div><div class="kpi-sub">${R(parc.reduce((s,l)=>s+l.valor,0))}</div></div>
    <div class="kpi c-a"><div class="kpi-lbl">Fixos</div><div class="kpi-val">${fixos.length}</div><div class="kpi-sub">${R(fixos.reduce((s,l)=>s+l.valor,0))}</div></div>
    <div class="kpi ${statusColor}"><div class="kpi-lbl">Status</div><div class="kpi-val" style="font-size:13px;line-height:1.3">${statusTxt}</div></div>
  </div>

  ${fp?`<div class="tip tip-green" style="margin-bottom:16px">✅ Fatura paga em ${fdt(fp.data_pagamento)} via <strong>${esc(fp.conta_pagamento)}</strong> — ${R(fp.valor)}</div>`:''}

  <!-- Tabela agrupada -->
  <div class="card">
    <div class="card-head">
      <h3>Lançamentos desta fatura</h3>
      <span class="txt-xs" style="color:var(--ink3)">${transacoes.length} item(s)</span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Valor</th><th>Status</th><th></th></tr></thead>
        <tbody>
          ${section('🛒 Compras avulsas', manuais, '', 'Nenhuma compra avulsa neste período')}
          ${section('📦 Parcelados', parc, '', 'Nenhuma parcela neste período')}
          ${section('🔁 Despesas fixas', fixos, '', 'Nenhuma despesa fixa neste período')}
          ${!transacoes.length?`<tr><td colspan="6"><div class="empty"><big>🧾</big>Nenhum lançamento nesta fatura</div></td></tr>`:''}
        </tbody>
      </table>
    </div>
  </div>`);
}

  // Abre o modal normal e depois pre-seleciona o cartão e tipo D
  openLancModal();
  setTimeout(()=>{

// Exclui lançamento e volta para a tela de fatura
function delLancFatura(id){

  set(`<div class="two">${table('R','↑ Categorias de Receita','--green','btn-green')}${table('D','↓ Categorias de Despesa','--red','btn-red')}</div>`)

// ── RELATÓRIO ────────────────────────────────────────────────────────
let relIni=new Date().toISOString().slice(0,7)+'-01', relFim=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).toISOString().slice(0,10);
let relTab='resumo'; // 'resumo' | 'fluxo'
let relAporteMin=0; // limite mínimo para alertar aporte
let relContaFiltro=''; // conta filtrada no saldo diário

function dailyForecast(ini,fim,contaFiltro=''){
  ensureFixedLaunchesBetween(ini,fim);
  const days=[];let d=new Date(ini+'T12:00'),end=new Date(fim+'T12:00');
  const contas=db.contas.filter(c=>c.ativo&&(!contaFiltro||c.nome===contaFiltro));
  let saldos={};
  const diaAnterior=addDays(ini,-1);
  contas.forEach(c=>saldos[c.nome]=saldoConta(c.nome,diaAnterior,false));
  while(d<=end){
    const ds=d.toISOString().slice(0,10);
    const movs=db.lancamentos.filter(l=>l.data===ds&&isContaBancaria(l.conta)&&(!contaFiltro||l.conta===contaFiltro));
    movs.forEach(l=>{saldos[l.conta]=(saldos[l.conta]||0)+signedValue(l)});
    const total=Object.values(saldos).reduce((s,v)=>s+v,0);
    days.push({data:ds,total,saldos:{...saldos},entradas:movs.filter(l=>isEntrada(l.tipo)).reduce((s,l)=>s+l.valor,0),saidas:movs.filter(l=>isSaida(l.tipo)).reduce((s,l)=>s+l.valor,0),movs});
    d.setDate(d.getDate()+1)
  }
  return days
}

// Previsão de fluxo de caixa FUTURO (a partir de hoje ou data personalizada)
function futureCashFlow(ini, fim){
  ensureFixedLaunchesBetween(ini, fim);
  const hoje = new Date().toISOString().slice(0,10);
  const days = [];
  let d = new Date(ini+'T12:00'), end = new Date(fim+'T12:00');
  const contas = db.contas.filter(c=>c.ativo && c.tipo !== 'Investimento');
  let saldos = {};
  const diaAnterior = addDays(ini,-1);
  contas.forEach(c=>saldos[c.nome]=saldoConta(c.nome,diaAnterior,true));
  let saldoAcum = Object.values(saldos).reduce((s,v)=>s+v,0);

  // Também inclui faturas de cartão com vencimento no período
  const faturasCartao = [];
  db.cartoes.filter(c=>c.ativo).forEach(c=>{
    let d2=new Date(ini+'T12:00');
    while(d2<=end){
      const y=d2.getFullYear(),m=d2.getMonth();
      const diaVenc=String(Math.min(c.vencimento,new Date(y,m+1,0).getDate())).padStart(2,'0');
      const dataVenc=`${y}-${String(m+1).padStart(2,'0')}-${diaVenc}`;
      if(dataVenc>=ini&&dataVenc<=fim){
        const diaFech=c.fechamento;
        let fechAnterior=new Date(y,m,diaFech,12);
        if(diaFech>=c.vencimento) fechAnterior=new Date(y,m-1,diaFech,12);
        const fechStr=fechAnterior.toISOString().slice(0,10);
        const fechAnt2=addDays(fechStr,-30);
        const gastos=db.lancamentos.filter(l=>l.conta===c.nome&&l.tipo==='D'&&l.data>fechAnt2&&l.data<=fechStr).reduce((s,l)=>s+l.valor,0);
        if(gastos>0) faturasCartao.push({data:dataVenc,cartao:c.nome,valor:gastos,cor:c.cor});
      }
      d2.setMonth(d2.getMonth()+1);
    }
  });

  while(d<=end){
    const ds=d.toISOString().slice(0,10);
    const movs=db.lancamentos.filter(l=>l.data===ds&&isContaBancaria(l.conta));
    const faturas=faturasCartao.filter(f=>f.data===ds);
    const faturaTotal=faturas.reduce((s,f)=>s+f.valor,0);
    movs.forEach(l=>{saldos[l.conta]=(saldos[l.conta]||0)+signedValue(l)});
    saldoAcum=Object.values(saldos).reduce((s,v)=>s+v,0)-faturaTotal;
    const entradas=movs.filter(l=>isEntrada(l.tipo)).reduce((s,l)=>s+l.valor,0);
    const saidas=movs.filter(l=>isSaida(l.tipo)).reduce((s,l)=>s+l.valor,0)+faturaTotal;
    const isFuture=ds>hoje;
    days.push({data:ds,saldoAcum,entradas,saidas,faturas,movs,isFuture});
    d.setDate(d.getDate()+1);
  }
  return days;
}

      </tbody></table></div>
    </div>`);
  } else {

function setRelPeriod(months){
  const now=new Date();
  if(months===0){relIni=`${now.getFullYear()}-01-01`;relFim=`${now.getFullYear()}-12-31`}
  else{const ini=new Date(now.getFullYear(),now.getMonth()-months+1,1);relIni=ini.toISOString().slice(0,10);relFim=new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().slice(0,10)}
  pRel()
}
