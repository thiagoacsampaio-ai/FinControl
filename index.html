      <div class="fg full"><label>Nova senha (mín. 6 caracteres)</label><input type="password" id="cpw-new" placeholder="••••••••" autocomplete="new-password"></div>
      <div class="fg full"><label>Confirmar nova senha</label><input type="password" id="cpw-conf" placeholder="••••••••" autocomplete="new-password"></div>
    </div>`,
  `<button class="btn btn-ghost" onclick="closeM()">Cancelar</button><button class="btn btn-dark" onclick="doChangePw()">Alterar Senha</button>`);
}
async function doChangePw(){
  const np=document.getElementById('cpw-new').value, cp=document.getElementById('cpw-conf').value;
  if(!np||np.length<6){alert('A senha deve ter pelo menos 6 caracteres.');return}
  if(np!==cp){alert('As senhas não conferem.');return}
  try{
    const {updatePassword} = await import('https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js');
    await updatePassword(_fire.auth.currentUser, np);
    alert('Senha alterada com sucesso!');closeM();
  }catch(e){alert('Erro ao alterar senha: '+e.message);}
}
function openUserModal(eid){
  const u=eid?users.find(x=>x.id===eid):null;
  showM(u?'Editar Usuário':'Novo Usuário',`
    <div class="fgrid">
      <div class="fg full"><label>Nome completo *</label><input type="text" id="u-nm" value="${esc(u?u.nome:'')}" placeholder="João Silva"></div>
      <div class="fg"><label>Login (usuário) *</label><input type="text" id="u-lg" value="${esc(u?u.login:'')}" placeholder="joao.silva" autocomplete="off"></div>
      <div class="fg"><label>${u?'Nova senha (deixe em branco para manter)':'Senha *'}</label><input type="password" id="u-pw" placeholder="••••••••" autocomplete="new-password"></div>
      <div class="fg full"><label><input type="checkbox" id="u-adm" ${u?.admin?'checked':''} style="width:auto;margin-right:6px">Administrador</label></div>
    </div>`,
  `<button class="btn btn-ghost" onclick="closeM()">Cancelar</button><button class="btn btn-dark" onclick="saveUser(${eid||0})">Salvar</button>`);
}
async function saveUser(eid){
  const nm=fv('u-nm').trim(),lg=fv('u-lg').trim().toLowerCase(),pw=fv('u-pw'),adm=document.getElementById('u-adm').checked;
  if(!nm||!lg){alert('Preencha nome e login.');return}
  if(!eid&&!pw){alert('Informe uma senha.');return}
  if(lg!==( eid?users.find(x=>x.id===eid).login:'')&&users.find(x=>x.login===lg)){alert('Login já em uso.');return}
  if(eid){
    const i=users.findIndex(x=>x.id===eid);
    users[i]={...users[i],nome:nm,login:lg,admin:adm};
    if(pw)users[i].hash=await hashPassword(pw);
  } else {
    const hash=await hashPassword(pw);
    users.push({id:nid(users),nome:nm,login:lg,hash,admin:adm});
  }
  saveUsers(users);closeM();pUsuarios();
}
function delUser(id){if(!confirm('Excluir usuário?'))return;users=users.filter(u=>u.id!==id);pUsuarios()}

// ── EXPORT ───────────────────────────────────────────────────────────
function tableData(name){
  if(name==='lancamentos')return [['Data','Descrição','Categoria','Conta','Tipo','Valor','Pago','Origem','Parcela'],...db.lancamentos.map(l=>[l.data,l.desc,catFullName(catById(l.cat_id)),l.conta,l.tipo,l.valor,l.pago!==false?'Pago':'Pendente',l.origem||'manual',l.parcela_num?`${l.parcela_num}/${l.parcela_total}`:''])];
  if(name==='contas')return [['Nome','Tipo','Natureza','Saldo inicial','Saldo atual','Ativo'],...db.contas.map(c=>[c.nome,c.tipo,c.subtipo,c.saldo_ini,saldoConta(c.nome),c.ativo?'Sim':'Não'])];
  if(name==='cartoes')return [['Nome','Bandeira','Conta vinculada','Fechamento','Vencimento','Limite','Fatura','Ativo'],...db.cartoes.map(c=>[c.nome,c.bandeira,db.contas.find(x=>x.id===c.conta_id)?.nome||'',c.fechamento,c.vencimento,c.limite,gastoCartao(c.nome),c.ativo?'Sim':'Não'])];
  if(name==='categorias')return [['Nome','Tipo','Pai','Ícone','Cor'],...db.categorias.map(c=>[c.nome,c.tipo,c.parent_id?catById(c.parent_id).nome:'',c.icone,c.cor])];
  if(name==='parcelados')return [['Descrição','Categoria','Conta','Compra','Primeira parcela','Total','Parcelas','Pagas'],...db.parcelados.map(p=>[p.desc,catFullName(catById(p.cat_id)),p.conta,p.data,p.primeira_data,p.total,p.np,p.pg])];
  if(name==='fixos')return [['Descrição','Categoria','Conta','Dia','Valor','Ativo'],...db.fixos.map(f=>[f.desc,catFullName(catById(f.cat_id)),f.conta,f.dia,f.valor,f.ativo?'Sim':'Não'])];
  if(name==='relatorio')return [['Data','Entradas','Saídas','Saldo previsto'],...dailyForecast(relIni,relFim,relContaFiltro).map(d=>[d.data,d.entradas,d.saidas,d.total])];
  return [[]]
}
function toCSV(rows){return rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(';')).join('\n')}
function exportScreenCSV(name){downloadText(`fincontrol_${name}_${new Date().toISOString().slice(0,10)}.csv`,'\uFEFF'+toCSV(tableData(name)),'text/csv;charset=utf-8')}
function exportAllCSV(){['lancamentos','contas','cartoes','categorias','parcelados','fixos','relatorio'].forEach((n,i)=>setTimeout(()=>exportScreenCSV(n),i*250))}
function exportAllExcel(){
  const sheets=['lancamentos','contas','cartoes','categorias','parcelados','fixos','relatorio'];
  let html='<html><head><meta charset="UTF-8"></head><body>';
  sheets.forEach(s=>{const rows=tableData(s);html+=`<h2>${s}</h2><table border="1">`+rows.map(r=>'<tr>'+r.map(v=>`<td>${esc(String(v??''))}</td>`).join('')+'</tr>').join('')+'</table><br>'});
  html+='</body></html>';
  downloadText(`fincontrol_dados_${new Date().toISOString().slice(0,10)}.xls`,html,'application/vnd.ms-excel;charset=utf-8')
}
function downloadText(filename,content,type){const b=new Blob([content],{type});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=filename;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}

// ── MODAL ─────────────────────────────────────────────────────────────
function showM(title, sizeOrBody, bodyOrFoot, foot){let size='',body,footer;if(foot===undefined){body=sizeOrBody;footer=bodyOrFoot;size=''}else{size=sizeOrBody;body=bodyOrFoot;footer=foot}document.getElementById('M-title').textContent=title;document.getElementById('M-body').innerHTML=body;document.getElementById('M-foot').innerHTML=footer||'';const box=document.getElementById('Mbox');box.className='modal'+(size?' '+size:'');document.getElementById('M').classList.remove('hidden')}
function closeM(){document.getElementById('M').classList.add('hidden')}
function initModalListener(){document.getElementById('M').addEventListener('click',e=>{if(e.target===document.getElementById('M'))closeM()})};

// ── BACKUP / RESTORE ──────────────────────────────────────────────────
function exportDB(){const b=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`fincontrol_backup_${new Date().toISOString().slice(0,10)}.json`;a.click()}
function triggerRestore(){document.getElementById('file-restore').click()}
function doRestore(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const p=JSON.parse(ev.target.result);if(!confirm('Isso substitui todos os dados atuais. Confirmar?'))return;db=p;migrateDB();save();go(page);alert('Dados restaurados!')}catch(err){alert('Arquivo inválido.')}};r.readAsText(f);e.target.value=''}
function set(html){document.getElementById('content').innerHTML=html}

// Fecha hints ao clicar fora
document.addEventListener('click',e=>{if(!e.target.closest('.hint-wrap'))document.querySelectorAll('.hint-wrap .hidden').forEach(el=>el.classList.add('hidden'))});

// ── BOOT ──────────────────────────────────────────────────────────────
async function bootApp(){
  await waitFire();
  initModalListener();
  document.querySelector('.sb-footer').insertAdjacentHTML('afterbegin',
    '<button class="btn btn-ghost btn-sm" style="flex:1;font-size:11px;color:rgba(255,255,255,.4);border-color:rgba(255,255,255,.12);background:transparent" onclick="exportAllCSV()">CSV</button>'+
    '<button class="btn btn-ghost btn-sm" style="flex:1;font-size:11px;color:rgba(255,255,255,.4);border-color:rgba(255,255,255,.12);background:transparent" onclick="exportAllExcel()">Excel</button>'
  );
  document.getElementById('tb-date').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});

  _fire.onAuthStateChanged(_fire.auth, async (fbUser)=>{
    if(fbUser){
      // Verificar se o e-mail está na lista de acesso permitido
      if(!ALLOWED_EMAILS.includes(fbUser.email)){
        await _fire.signOut(_fire.auth);
        const err=document.getElementById('login-err');
        err.textContent='Acesso não autorizado para este e-mail.';
        err.style.display='block';
        const btn=document.getElementById('btn-google-login');
        if(btn){btn.innerHTML=`<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg> Entrar com Google`;btn.disabled=false;}
        return;
      }
      // Usuário autenticado e autorizado — carregar dados do Firestore e abrir app
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('shell').classList.remove('hidden');
      const displayName = fbUser.displayName || fbUser.email.split('@')[0];
      const photoURL = fbUser.photoURL;
      currentUser = {id:fbUser.uid, nome:displayName, login:fbUser.email, admin:true, photo:photoURL};
      const avatarHtml = photoURL
        ? `<img src="${photoURL}" style="width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0">`
        : '👤';
      document.getElementById('tb-user').innerHTML=`<span style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink3)">${avatarHtml} ${esc(displayName)}</span>`;

      // Ouvir dados em tempo real
      if(_unsubscribe) _unsubscribe();
      const docRef = _fire.doc(_fire.fs, DB_DOC);
      _unsubscribe = _fire.onSnapshot(docRef, (snap)=>{
        if(snap.exists()){
          try{
            const remote = JSON.parse(snap.data().data);
            // Só atualiza se não foi a própria instância que salvou agora
            if(!_saveTimeout){
              db = remote;
              migrateDB_quiet();
              go(page);
            }
          }catch(e){console.error('Parse error:',e)}
        } else {
          // Primeira vez: subir seed
          save();
        }
        go(page);
      });

      // Primeiro carregamento
      try{
        const snap = await _fire.getDoc(_fire.doc(_fire.fs, DB_DOC));
        if(snap.exists()){
          db = JSON.parse(snap.data().data);
          migrateDB_quiet();
        } else {
          db = loadDB();
          save();
        }
      }catch(e){console.error('Firestore load error:',e)}
      go('painel');
    } else {
      // Não autenticado — mostrar login
      if(_unsubscribe){_unsubscribe();_unsubscribe=null;}
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('shell').classList.add('hidden');
      const btn=document.querySelector('#login-screen button');
      if(btn){btn.textContent='Entrar';btn.disabled=false;}
    }
  });

  // Mostrar tela de login enquanto aguarda auth
  document.getElementById('login-screen').classList.remove('hidden');
}

function sanitizeDB(){
  // Remove lançamentos de pagamento_fatura sem cartão correspondente
  const cartaoIds=new Set(db.cartoes.map(c=>c.id));
  const cartaoNomes=new Set(db.cartoes.map(c=>c.nome));
  db.faturas_pagas=db.faturas_pagas.filter(x=>cartaoIds.has(x.cartao_id));
  db.lancamentos=db.lancamentos.filter(l=>{
    if(l.origem==='pagamento_fatura') return l.cartao_id&&cartaoIds.has(l.cartao_id);
    return true;
  });
  // Remove faturas_pagas sem lancamentos correspondentes (integridade)
  // Remove parcelados cujos lançamentos ficaram sem ref
  db.fixos=db.fixos.filter(f=>!f.conta||db.contas.find(c=>c.nome===f.conta)||db.cartoes.find(c=>c.nome===f.conta));
}

function migrateDB_quiet(){
  // migrateDB sem chamar save() para não criar loop com onSnapshot
  db.faturas_pagas=db.faturas_pagas||[];db.contas=db.contas||[];db.cartoes=db.cartoes||[];db.categorias=db.categorias||[];db.lancamentos=db.lancamentos||[];db.parcelados=db.parcelados||[];db.fixos=db.fixos||[];
  db.categorias.forEach(c=>{if(c.parent_id===undefined)c.parent_id=null;if(!c.icone)c.icone='📌';if(!c.cor)c.cor=c.tipo==='R'?'#00875a':'#c9283e'});
  db.lancamentos.forEach(l=>{if(l.pago===undefined)l.pago=true;if(!l.origem)l.origem=l.importado?'importado':'manual';l.valor=Number(l.valor||0)});
  db.parcelados.forEach(p=>{if(!p.primeira_data)p.primeira_data=p.data;if(p.pg===undefined)p.pg=0});
  db.fixos.forEach(f=>{if(!f.meses)f.meses={};f.valor=Number(f.valor||0);if(f.repetir_meses===undefined)f.repetir_meses=0;if(!f.data_inicio)f.data_inicio=new Date().toISOString().slice(0,10);if(!f.frequencia)f.frequencia='mensal';});
  db.parcelados.forEach(p=>{if(!db.lancamentos.some(l=>l.origem==='parcelado'&&l.ref_id===p.id))regenerateParcelLaunches(p)});
  db.lancamentos.forEach(l=>{if(l.origem==='pagamento_fatura')l.origem='provisao_fatura';});
  sanitizeDB(); // limpa órfãos
}

bootApp();
</script>
