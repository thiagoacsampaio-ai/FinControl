<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" width="200" height="56">
  <!-- Icon mark -->
  <rect width="56" height="56" rx="12" fill="#0d1117"/>
  <!-- Three ascending bars -->
  <rect x="8"  y="34" width="9"  height="14" rx="2" fill="#00875a" opacity="0.5"/>
  <rect x="23" y="24" width="9"  height="24" rx="2" fill="#00875a" opacity="0.75"/>
  <rect x="38" y="13" width="9"  height="35" rx="2" fill="#00875a"/>
  <!-- Trend line -->
  <polyline points="12.5,33 27.5,23 42.5,12" stroke="#00875a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="42.5" cy="12" r="2.8" fill="#00875a"/>

  <!-- Wordmark -->
  <text x="70" y="22" font-family="DM Sans, system-ui, sans-serif" font-weight="700" font-size="18" fill="#0d1117" letter-spacing="-0.3">Fin</text>
  <text x="100" y="22" font-family="DM Sans, system-ui, sans-serif" font-weight="700" font-size="18" fill="#00875a" letter-spacing="-0.3">Control</text>
  <text x="70" y="38" font-family="DM Sans, system-ui, sans-serif" font-weight="400" font-size="10" fill="#7c8799" letter-spacing="0.5">FINANÇAS PESSOAIS</text>
</svg>
